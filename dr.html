<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الأطباء - نتائج البحث</title>
    <!-- خط Cairo الحديث -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --accent: #d6336c;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --radius: 20px;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 30px;
        }

        /* شريط علوي نحيف */
        .top-nav {
            background: #000;
            color: white;
            padding: 10px 20px;
            font-size: 0.75rem;
            text-align: center;
            font-weight: 600;
        }

        /* الهيدر الرئيسي */
        header {
            padding: 20px;
            background: var(--surface);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            width: 42px; height: 42px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .nav-btn:active { transform: scale(0.9); }

        /* شريط البحث المودرن */
        .search-wrapper {
            position: relative;
        }

        #search {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border-radius: 15px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        #search:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .search-wrapper i {
            position: absolute;
            right: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
        }

        /* رسالة الانتظار بشكل توب بار */
        #loading {
            background: #dbeafe;
            color: #1e40af;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 700;
            margin: 10px 20px;
            border-radius: 12px;
            transition: opacity 1.5s ease;
        }

        /* تصميم كارت الطبيب الجديد */
        .doctor-card {
            background: var(--surface);
            margin: 15px 20px;
            padding: 20px;
            border-radius: 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
            transition: 0.3s;
            position: relative;
        }

        .doctor-card:hover { transform: translateY(-3px); }

        .doc-header { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px; }
        
        .doc-avatar {
            width: 55px; height: 55px;
            background: #eff6ff;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 1.5rem;
        }

        .doc-info h3 { font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
        .doc-info .specialty { font-size: 0.85rem; font-weight: 700; color: var(--primary); }

        .doc-details { border-top: 1px solid #f1f5f9; padding-top: 12px; }

        .detail-item {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px; font-size: 0.85rem; color: var(--text-sub);
        }

        .detail-item i { width: 18px; color: var(--primary); }
        .detail-item strong { color: var(--text-main); margin-left: 5px; }

        /* أزرار الإجراءات السريعة */
        .actions-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.3s;
        }

        .btn-call { background: var(--primary); color: white; }
        .btn-map { background: #f1f5f9; color: var(--text-main); }

        .action-btn:active { transform: scale(0.95); }

        .footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        📱 تطبيق العيادات الطبية - البحث الذكي والسريع
    </div>

    <header>
        <div class="nav-row">
            <a href="https://haiderameri14.github.io/Dr/ho1.html" class="nav-btn" title="المستشفى">🏥</a>
            <h1 style="font-size: 1.2rem; font-weight: 800;">دليل الأطباء</h1>
            <a href="https://haiderameri14.github.io/Dr/ho.html" class="nav-btn" title="الرئيسية">🏠</a>
        </div>

        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search" placeholder="ابحث باسم الطبيب أو التخصص..." onkeyup="filterDoctors()" />
        </div>
    </header>

    <div id="loading">
        <i class="fa-solid fa-spinner fa-spin"></i> يرجى الانتظار ثوانٍ لجلب البيانات...
    </div>

    <div id="doctorList">
        <!-- يتم توليد البيانات هنا بواسطة JS -->
    </div>

    <div class="footer">
        برمجة وتصميم: <strong>حيدر العامري</strong> © 2025
    </div>

<script>
const DOCTORS_API = 'https://script.google.com/macros/s/AKfycbwQMMzmV96oKhiKuCWioFHi7XacyB-3g7cGWg2ifWuSfL2fgRqfehkskCKdcEqRTaH_SQ/exec';
let doctors = [];

async function loadData() {
  try {
    const doctorsRes = await fetch(`${DOCTORS_API}?action=getSheetData`);
    doctors = await doctorsRes.json();
    displayDoctors();
  } catch(err) {
    console.error('خطأ في جلب البيانات:', err);
    document.getElementById('doctorList').innerHTML = '<p style="color:red; text-align:center; padding:20px;">حدث خطأ أثناء جلب البيانات. تأكد من اتصال الإنترنت.</p>';
  }
}

function displayDoctors() {
  const container = document.getElementById('doctorList');
  container.innerHTML = '';
  const today = new Date().toISOString().split('T')[0];
  const filteredDoctors = doctors.filter(doc => !doc.hide_date || doc.hide_date > today);

  filteredDoctors.reverse().forEach(doc => {
    const phone = (doc.phone || '').replace(/^'/, '').replace(/'$/, '');
    const mapLink = doc.map || '';

    let cardHTML = `
      <div class="doctor-card">
        <div class="doc-header">
            <div class="doc-avatar"><i class="fa-solid fa-user-doctor"></i></div>
            <div class="doc-info">
                <h3>${doc.name || 'غير متوفر'}</h3>
                <p class="specialty">${doc.specialty || 'تخصص عام'}</p>
            </div>
        </div>
        
        <div class="doc-details">
            ${doc.address ? `<div class="detail-item"><i class="fa-solid fa-location-dot"></i> <span><strong>العنوان:</strong> ${doc.address}</span></div>` : ''}
            ${phone ? `<div class="detail-item"><i class="fa-solid fa-phone"></i> <span><strong>الهاتف:</strong> ${phone}</span></div>` : ''}
            ${doc.holiday ? `<div class="detail-item"><i class="fa-solid fa-calendar-xmark"></i> <span><strong>العطلة:</strong> ${doc.holiday}</span></div>` : ''}
            ${doc.notes ? `<div class="detail-item"><i class="fa-solid fa-comment-medical"></i> <span><strong>ملاحظات:</strong> ${doc.notes}</span></div>` : ''}
        </div>

        <div class="actions-row">
            ${phone ? `<a href="tel:${phone}" class="action-btn btn-call"><i class="fa-solid fa-phone"></i> اتصال</a>` : ''}
            ${mapLink ? `<a href="${mapLink}" class="action-btn btn-map" target="_blank"><i class="fa-solid fa-map-location-dot"></i> الخريطة</a>` : ''}
        </div>
      </div>
    `;

    const cardElement = document.createElement('div');
    cardElement.innerHTML = cardHTML;
    container.appendChild(cardElement);
  });
}

function filterDoctors() {
  const keyword = normalize(document.getElementById('search').value);
  const cards = document.querySelectorAll('.doctor-card');
  cards.forEach(card => {
    const cardText = normalize(card.innerText);
    card.style.display = cardText.includes(keyword) ? 'block' : 'none';
  });
}

function normalize(text) {
  return text
    .toLowerCase()
    .replace(/[أإآا]/g, 'ا')
    .replace(/ى/g, 'ي')
    .replace(/ؤ/g, 'و')
    .replace(/ئ/g, 'ي')
    .replace(/ة/g, 'ه')
    .replace(/[\u064B-\u065F]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

loadData();

// إخفاء عبارة الانتظار
setTimeout(() => {
  const loadingEl = document.getElementById("loading");
  if(loadingEl) {
      loadingEl.style.opacity = "0";
      setTimeout(() => loadingEl.style.display = "none", 1500);
  }
}, 5000);
</script>

</body>
</html>
